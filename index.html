<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reading Flash Cards</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .card {
      width: min(92vw, 700px);
      height: min(60vh, 420px);
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .word {
      font-size: clamp(44px, 9vw, 96px);
      font-weight: 700;
      letter-spacing: 1px;
    }
    .hint {
      margin-top: 18px;
      font-size: 18px;
      opacity: .7;
      line-height: 1.2;
    }
    .row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      border: 0;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
    }
    .primary { background: #111; color: #fff; }
    .ghost { background: #e9e9e9; color: #111; }
  </style>
</head>
<body>
  <div class="card" id="card" role="button" aria-label="Tap for next word">
    <div class="word" id="word">Tap to start</div>
    <div class="hint" id="hint">
      Tap the card for the next word<br>
      Buttons: shuffle, restart
    </div>
    <div class="row">
      <button class="ghost" id="shuffleBtn" type="button">Shuffle</button>
      <button class="ghost" id="restartBtn" type="button">Restart</button>
      <button class="primary" id="nextBtn" type="button">Next</button>
    </div>
  </div>

  <script>
    // Your 1st grade word list
    const words = [
      "school","down","out","very","be","pull","move","two","again","new",
      "there","use","could","live","one","then","three","eat","under","all",
      "call","day","her","want","around"
    ];

    // Fisher-Yates shuffle
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    let deck = [];
    let index = 0;

    const wordEl = document.getElementById("word");
    const hintEl = document.getElementById("hint");
    const cardEl = document.getElementById("card");

    function startNewDeck() {
      deck = shuffleArray([...words]);
      index = 0;
      showCurrent();
    }

    function showCurrent() {
      if (deck.length === 0) startNewDeck();
      wordEl.textContent = deck[index];
      hintEl.textContent = "Tap when she reads it correctly";
    }

    function nextWord() {
      index++;
      if (index >= deck.length) {
        // reshuffle after finishing all words
        startNewDeck();
        return;
      }
      showCurrent();
    }

    // Controls
    document.getElementById("nextBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      nextWord();
    });

    document.getElementById("shuffleBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      startNewDeck();
    });

    document.getElementById("restartBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      deck = [...words];
      index = 0;
      showCurrent();
    });

    // Tap anywhere on the card to advance
    cardEl.addEventListener("click", () => {
      if (wordEl.textContent === "Tap to start") {
        startNewDeck();
      } else {
        nextWord();
      }
    });
  </script>
</body>
</html>
